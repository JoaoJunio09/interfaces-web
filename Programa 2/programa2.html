<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2>Exemplo de click em botão</h2>

    <button type="button" 
            onclick="document.getElementById('data').innerHTML = Date();">
            Data e hora</button>
    <button type="button" 
            onclick="document.getElementById('data').innerHTML = 'Hello, World!'">
            Olá mundo</button>

    <p id="data"></p>
</body>
</html>
